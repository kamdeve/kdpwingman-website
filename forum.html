<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Centrum Społeczności - KDP Wingman</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        /* --- JASNY STYL --- */
        :root {
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --cherry: #a0134a;
            --cherry-light: rgba(160, 19, 74, 0.1);
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-light: #e2e8f0;
            --success: #10b981;
        }

        body { background-color: var(--bg-light); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }

        /* NAVBAR */
        .navbar-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 1000; width: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .navbar-content { max-width: 1000px; margin: 0 auto; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-link { text-decoration: none; font-weight: 800; font-size: 1.4rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-item { text-decoration: none; color: var(--text-muted); font-weight: 600; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--cherry); }

        /* LAYOUT */
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        .btn-primary { background: var(--cherry); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px var(--cherry-light); }
        .btn-primary:hover { background: #8a0f3e; transform: translateY(-2px); }

        /* TABS */
        .tabs-container { display: flex; gap: 10px; margin-bottom: 25px; background: var(--bg-white); padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid var(--border-light); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 700; color: var(--text-muted); border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .tab-btn.active { background: var(--cherry-light); color: var(--cherry); }

        /* POSTY FACEBOOK STYLE */
        .post-card { background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.3s; position: relative; }
        .post-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .author-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: var(--cherry-light); color: var(--cherry); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .author-name { font-weight: 700; color: var(--text-main); font-size: 1.05rem; margin-bottom: 2px;}
        .post-meta { font-size: 0.8rem; color: var(--text-muted); }
        .tag { font-size: 0.7rem; background: #e2e8f0; color: var(--text-muted); padding: 4px 10px; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
        .post-title { font-size: 1.3rem; font-weight: 800; margin: 15px 0 10px 0; color: var(--text-main); }
        .post-content { color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; font-size: 0.95rem; }
        .post-image { width: 100%; border-radius: 10px; margin-top: 15px; object-fit: cover; max-height: 400px; border: 1px solid var(--border-light); }
        .post-actions { display: flex; gap: 15px; margin-top: 20px; border-top: 1px solid var(--border-light); padding-top: 15px; }
        .action-btn { background: transparent; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; }
        .action-btn:hover, .action-btn.liked { color: var(--cherry); }

        /* MODAL */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
        .modal-box { background: var(--bg-white); width: 90%; max-width: 600px; border-radius: 16px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); border: 1px solid var(--border-light); max-height: 90vh; overflow-y: auto; }
        .modal-box h3 { color: var(--text-main); font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; }
        textarea, select, input { width:100%; background:var(--bg-light); border:1px solid var(--border-light); border-radius:8px; color:var(--text-main); padding:15px; margin-bottom:15px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        textarea:focus, select:focus, input:focus { outline: none; border-color: var(--cherry); }

        /* DRAG & DROP W MODALU ADMINA */
        .drop-zone { border: 2px dashed var(--border-light); border-radius: 8px; padding: 30px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: var(--bg-light); margin-bottom: 15px; }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--cherry); background: var(--cherry-light); }
        .drop-zone i { font-size: 2rem; color: var(--cherry); margin-bottom: 10px; }
        .drop-zone p { margin: 0; font-size: 0.9rem; color: var(--text-muted); }

        .comment-box { background: var(--bg-light); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-light); }
        .comment-author { font-weight: 700; color: var(--text-main); font-size: 0.9rem; display: flex; justify-content: space-between; }
        .comment-text { color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; line-height: 1.5; white-space: pre-wrap; }
        .hidden { display: none !important; }
    </style>

<script>

    })
</script>

</head>
<body>

    <header class="navbar-container">
        <nav class="navbar-content">
            <a href="index.html" class="logo-link">
                <i class="fas fa-chart-line" style="color: var(--cherry);"></i> KDP <span style="color: var(--cherry);">Wingman</span>
            </a>
            <div class="nav-links">
                <a href="group-buy.html" class="nav-item">Zrzutka</a>
                <a href="forum.html" class="nav-item active">Społeczność</a>
                <a href="dashboard.html" class="nav-item">Mój Panel</a>
            </div>
        </nav>
    </header>

    <div class="container">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 2rem; font-weight: 800; margin: 0;">Centrum <span style="color: var(--cherry);">Wiedzy</span></h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Ucz się, pytaj i rozwijaj swój biznes na KDP.</p>
            </div>
            <button id="add-post-btn" class="btn-primary hidden" onclick="document.getElementById('post-modal').style.display='flex'; if(userQuill) userQuill.setContents([]);">
                <i class="fas fa-edit"></i> Napisz post
            </button>
            <button id="admin-add-post-btn" class="btn-primary hidden" onclick="openAdminModal()" style="background: #0f172a;">
                <i class="fas fa-plus"></i> Dodaj Wiedzę
            </button>
        </div>

        <div class="tabs-container">
            <button id="tab-admin" class="tab-btn active" onclick="switchMainTab('admin')"><i class="fas fa-graduation-cap"></i> Wiedza od Kamila</button>
            <button id="tab-user" class="tab-btn" onclick="switchMainTab('user')"><i class="fas fa-users"></i> Dyskusje Społeczności</button>
        </div>

        <div id="feed-admin">
            <div id="admin-posts-container">
                <p style="text-align: center; color: var(--text-muted); padding: 40px;">Ładowanie wpisów...</p>
            </div>
        </div>

        <div id="feed-user" class="hidden">
            <div id="user-posts-container">
                <p style="text-align: center; color: var(--text-muted); padding: 40px;">Ładowanie dyskusji...</p>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal">
        <div class="modal-box">
            <h3>Utwórz nowy wątek</h3>
            <select id="forum-topic">
                <option value="Research">🔍 Research & Nisze</option>
                <option value="Design">🎨 Design & Ilustracje</option>
                <option value="Reklamy">📈 Reklamy KDP</option>
                <option value="Techniczne">⚙️ Sprawy techniczne</option>
            </select>
            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">Treść pytania / wpisu</label>
<div id="user-editor-container" style="height: 200px; background: var(--bg-white); margin-bottom: 15px; border-radius: 0 0 8px 8px;"></div>
            
            <div style="display:flex; justify-content: flex-end; gap:10px;">
                <button class="tab-btn" style="background: var(--bg-light); border: 1px solid var(--border-light);" onclick="document.getElementById('post-modal').style.display='none'">Anuluj</button>
                <button class="btn-primary" onclick="submitUserPost()">Opublikuj <i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="thread-modal" class="modal">
        <div class="modal-box" style="position: relative;">
            <button onclick="document.getElementById('thread-modal').style.display='none'" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;">&times;</button>
            
            <div id="thread-content">Ładowanie...</div>
            
            <div style="margin-top: 25px; border-top: 1px solid var(--border-light); padding-top: 20px;">
                <textarea id="comment-content" placeholder="Napisz odpowiedź..." style="height: 100px; margin-bottom: 10px;"></textarea>
                <button class="btn-primary" style="width: 100%; justify-content: center;" onclick="submitComment()">Opublikuj Odpowiedź</button>
            </div>
        </div>
    </div>

    <div id="admin-knowledge-modal" class="modal">
        <div class="modal-box">
            <h3 style="color: var(--text-main);"><i class="fas fa-edit"></i> Dodaj Artykuł / Poradnik</h3>
            
            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">Temat wpisu</label>
            <input type="text" id="knowledge-title" placeholder="np. Jak szukać nisz w Helium 10?">
            
            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">Treść wpisu</label>
            <div id="editor-container" style="height: 300px; background: var(--bg-white); margin-bottom: 15px; border-radius: 0 0 8px 8px;"></div>
            
            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">Miniaturka (Opcjonalnie)</label>
            <div class="drop-zone" id="knowledge-drop-zone" onclick="document.getElementById('knowledge-image-input').click()">
                <i class="fas fa-image"></i>
                <p>Kliknij, aby dodać zrzut ekranu lub grafikę</p>
                <input type="file" id="knowledge-image-input" accept="image/*" style="display: none;">
            </div>
            <img id="knowledge-image-preview" style="display: none; width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px;">
            
            <div style="display:flex; justify-content: flex-end; gap:10px;">
                <button class="tab-btn" style="background: var(--bg-light); border: 1px solid var(--border-light);" onclick="closeAdminModal()">Anuluj</button>
                <button class="btn-primary" id="admin-save-btn" onclick="submitKnowledgePost()">Opublikuj Wiedzę <i class="fas fa-rocket"></i></button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://kdpwingmanv2backend-production.up.railway.app";
        const userEmail = localStorage.getItem('wingman_user');
        const adminSecret = localStorage.getItem('admin_secret');
        const isAdmin = adminSecret === 'super_tajne_haslo_admina';

        let currentTab = 'admin';
        let currentThreadId = null;
        let knowledgeImageBase64 = "";


// --- INICJALIZACJA EDYTORA QUILL ---
        let quill;      // Edytor admina
        let userQuill;  // Edytor użytkownika
        window.addEventListener('load', function() {
            // 1. Edytor dla zwykłych użytkowników (Zawsze aktywny)
            userQuill = new Quill('#user-editor-container', {
                theme: 'snow',
                placeholder: 'O co chcesz zapytać grupę? Możesz formatować tekst i dodawać zdjęcia...',
                modules: {
                    toolbar: {
                        container: [
                            ['bold', 'italic', 'underline'], 
                            [{ 'color': [] }],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            ['link', 'image']
                        ],
                        handlers: {
                            image: function() {
                                const range = this.quill.getSelection();
                                const value = prompt('Wklej link bezpośredni do zdjęcia (np. z imgur.com):');
                                if(value){
                                    this.quill.insertEmbed(range.index, 'image', value, Quill.sources.USER);
                                }
                            }
                        }
                    }
                }
            });

            // 2. Edytor dla Admina (Tylko jeśli zalogowany jako admin)
            if (isAdmin) {
                quill = new Quill('#editor-container', {
                    theme: 'snow',
                    placeholder: 'Podziel się wiedzą...',
                    modules: {
                        toolbar: {
                            container: [
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'align': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['link', 'image']
                            ],
                            handlers: {
                                image: function() {
                                    const range = this.quill.getSelection();
                                    const value = prompt('Wklej link bezpośredni do zdjęcia (np. z imgur.com):');
                                    if(value){
                                        this.quill.insertEmbed(range.index, 'image', value, Quill.sources.USER);
                                    }
                                }
                            }
                        }
                    }
                });
            }
        });

        // --- INICJALIZACJA STRONY ---
        if (isAdmin) {
            document.getElementById('admin-add-post-btn').classList.remove('hidden');
            setupDragAndDrop();
        }
        loadAdminPosts();

        // Przełączanie głównych zakładek
        function switchMainTab(tab) {
            currentTab = tab;
            document.getElementById('tab-admin').classList.remove('active');
            document.getElementById('tab-user').classList.remove('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            document.getElementById('feed-admin').classList.add('hidden');
            document.getElementById('feed-user').classList.add('hidden');
            document.getElementById(`feed-${tab}`).classList.remove('hidden');

            const addUserBtn = document.getElementById('add-post-btn');
            const addAdminBtn = document.getElementById('admin-add-post-btn');

            if (tab === 'user') {
                addUserBtn.classList.remove('hidden');
                if (isAdmin) addAdminBtn.classList.add('hidden');
                loadUserPosts();
            } else {
                addUserBtn.classList.add('hidden');
                if (isAdmin) addAdminBtn.classList.remove('hidden');
                loadAdminPosts();
            }
        }

        // ==========================================
        // SYSTEM BAZY WIEDZY (ZAKŁADKA ADMINA)
        // ==========================================
        async function loadAdminPosts() {
            try {
                // POBIERAMY DANE Z NOWEGO MIEJSCA
                const res = await fetch(`${API}/api/knowledge/posts`);
                const posts = await res.json();
                const container = document.getElementById('admin-posts-container');
                
                // ZAPISUJEMY POSTY DO ZMIENNEJ GLOBALNEJ, żeby użyć ich przy rozwijaniu
                knowledgePostsList = posts;

                if (posts.length === 0) {
                    container.innerHTML = `<p style="text-align: center;">Brak artykułów w bazie wiedzy.</p>`;
                    return;
                }

                container.innerHTML = posts.map(p => {
                    const hasLiked = localStorage.getItem(`liked_knowledge_${p.id}`);
                    const likeClass = hasLiked ? 'liked' : '';
                    
                    const isLong = p.content.length > 300;
                    
                    // W widoku skróconym usuwamy tagi HTML, żeby nie psuły wyglądu listy
                    const strippedText = p.content.replace(/<[^>]*>?/gm, '');
                    const shortText = strippedText.length > 300 ? strippedText.substring(0, 300) + '...' : strippedText;

                    return `
                    <div class="post-card">
                        ${isAdmin ? `<button onclick="deleteKnowledgePost(${p.id})" style="position:absolute; top:20px; right:20px; background:none; color:#ef4444; border:none; cursor:pointer; font-size:1.1rem;"><i class="fas fa-trash-alt"></i></button>` : ''}
                        
                        <div class="post-header">
                            <div class="author-info">
                                <div class="avatar"><img src="images/logo.svg" style="width: 25px;"></div>
                                <div>
                                    <div class="author-name">Kamil Sznicer <i class="fas fa-check-circle" style="color: #38bdf8; font-size: 0.8rem;"></i></div>
                                    <div class="post-meta">${new Date(p.created_at).toLocaleDateString('pl-PL', {day: 'numeric', month: 'long', year: 'numeric'})}</div>
                                </div>
                            </div>
                            <span class="tag">Baza Wiedzy</span>
                        </div>
                        
                        <h4 class="post-title">${p.title}</h4>
                        
                        <div class="post-content" id="admin-short-text-${p.id}" style="line-height: 1.6;">
                            ${shortText}
                            ${isLong ? `<button onclick="toggleAdminText(${p.id})" id="admin-read-btn-${p.id}" style="background:none; border:none; color:var(--cherry); font-weight:bold; cursor:pointer; padding:0; margin-left:5px;">Czytaj dalej <i class="fas fa-chevron-down"></i></button>` : ''}
                        </div>
                        
                        <div class="post-content hidden" id="admin-full-text-${p.id}" style="line-height: 1.6; font-size: 1.05rem;"></div>

                        ${p.image_url ? `<img src="${p.image_url}" class="post-image" id="admin-thumb-${p.id}">` : ''}

                        <div class="post-actions">
                            <button class="action-btn ${likeClass}" id="admin-like-btn-${p.id}" onclick="likeKnowledgePost(${p.id})">
                                <i class="fas fa-fire"></i> Pomocne (<span id="admin-like-count-${p.id}">${p.likes || 0}</span>)
                            </button>
                        </div>
                    </div>
                `}).join('');
            } catch (e) { console.error(e); }
        }

        function toggleAdminText(id) {
            const shortText = document.getElementById(`admin-short-text-${id}`);
            const fullText = document.getElementById(`admin-full-text-${id}`);
            const btn = document.getElementById(`admin-read-btn-${id}`);
            const thumb = document.getElementById(`admin-thumb-${id}`);

            if (fullText.classList.contains('hidden')) {
                // Rozwijamy
                shortText.classList.add('hidden');
                if (thumb) thumb.classList.add('hidden'); // Opcjonalnie: ukryj miniaturkę, żeby nie dublować obrazków

                // Znajdujemy post w globalnej liście i wstrzykujemy czysty HTML
                const post = knowledgePostsList.find(p => p.id === id);
                fullText.innerHTML = post.content;
                fullText.classList.remove('hidden');
                btn.innerHTML = 'Zwiń tekst <i class="fas fa-chevron-up"></i>';
                btn.classList.remove('hidden'); // Przycisk wraca
            } else {
                // Zwijamy
                fullText.classList.add('hidden');
                fullText.innerHTML = ''; // Czyścimy dla oszczędności pamięci
                shortText.classList.remove('hidden');
                if (thumb) thumb.classList.remove('hidden'); // Przywracamy miniaturkę
                btn.innerHTML = 'Czytaj dalej <i class="fas fa-chevron-down"></i>';
            }
        }

        async function likeKnowledgePost(id) {
            if (localStorage.getItem(`liked_knowledge_${id}`)) return alert("Już to polubiłeś!");
            try {
                // WYSYŁAMY LAJKA DO NOWEGO MIEJSCA
                const res = await fetch(`${API}/api/knowledge/like`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
                if (res.ok) {
                    localStorage.setItem(`liked_knowledge_${id}`, 'true');
                    const countSpan = document.getElementById(`admin-like-count-${id}`);
                    countSpan.innerText = parseInt(countSpan.innerText) + 1;
                    document.getElementById(`admin-like-btn-${id}`).classList.add('liked');
                }
            } catch (e) {}
        }

        async function deleteKnowledgePost(id) {
            if(!confirm("Trwale usunąć ten artykuł?")) return;
            try {
                const res = await fetch(`${API}/api/knowledge/post/${id}`, {
                    method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ secret: adminSecret })
                });
                if(res.ok) loadAdminPosts();
            } catch(e) { console.error(e); }
        }

        // --- OBSŁUGA MODALA ADMINA ---
        function openAdminModal() {
            document.getElementById('admin-knowledge-modal').style.display = 'flex';
            document.getElementById('knowledge-title').value = '';
            if(quill) quill.setContents([]);
            document.getElementById('knowledge-image-preview').style.display = 'none';
            document.getElementById('knowledge-drop-zone').style.display = 'block';
            knowledgeImageBase64 = "";
        }

        function closeAdminModal() {
            document.getElementById('admin-knowledge-modal').style.display = 'none';
        }

        function setupDragAndDrop() {
            const dropZone = document.getElementById('knowledge-drop-zone');
            const fileInput = document.getElementById('knowledge-image-input');
            const imagePreview = document.getElementById('knowledge-image-preview');

            if (!dropZone) return;

            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault(); dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
            });
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) processFile(e.target.files[0]);
            });

            function processFile(file) {
                if (!file.type.startsWith('image/')) return alert('Tylko pliki graficzne!');
                const reader = new FileReader();
                reader.onload = (e) => {
                    knowledgeImageBase64 = e.target.result;
                    imagePreview.src = knowledgeImageBase64;
                    imagePreview.style.display = 'block';
                    dropZone.style.display = 'none'; 
                };
                reader.readAsDataURL(file);
            }
        }

        async function submitKnowledgePost() {
            const title = document.getElementById('knowledge-title').value;
            const content = quill.root.innerHTML;
            if (!title || !content) return alert("Wypełnij temat i treść!");

            const btn = document.getElementById('admin-save-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publikowanie...';

            try {
                const res = await fetch(`${API}/api/knowledge/post`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title, content, image_url: knowledgeImageBase64, secret: adminSecret })
                });
                
                if (res.ok) {
                    closeAdminModal();
                    loadAdminPosts(); 
                } else {
                    alert("Błąd zapisu! Upewnij się, że zaktualizowałeś plik na serwerze.");
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = 'Opublikuj Wiedzę <i class="fas fa-rocket"></i>';
        }


        // ==========================================
        // DYSKUSJE SPOŁECZNOŚCI (FORUM)
        // ==========================================
        async function loadUserPosts() {
            try {
                const res = await fetch(`${API}/api/forum/posts`);
                const posts = await res.json();
                const container = document.getElementById('user-posts-container');

                if (posts.length === 0) {
                    container.innerHTML = `<p style="text-align: center;">Brak pytań. Bądź pierwszy!</p>`;
                    return;
                }

                container.innerHTML = posts.map(p => {
                    const authorAlias = p.email.split('@')[0];
                    const initial = authorAlias.charAt(0).toUpperCase();

                    return `
                    <div class="post-card" style="cursor: pointer;" onclick="openThread(${p.id})">
                        <div class="post-header">
                            <div class="author-info">
                                <div class="avatar" style="background: #e2e8f0; color: #64748b;">${initial}</div>
                                <div>
                                    <div class="author-name">${authorAlias}</div>
                                    <div class="post-meta">${new Date(p.created_at).toLocaleDateString()}</div>
                                </div>
                            </div>
                            <span class="tag" style="background: var(--cherry-light); color: var(--cherry);">${p.topic}</span>
                        </div>
                        
                        <div class="post-content" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">${p.content}</div>

                        <div class="post-actions" style="justify-content: space-between;">
                            <button class="action-btn" onclick="event.stopPropagation(); likeUserPost(${p.id}, this)">
                                <i class="fas fa-thumbs-up"></i> Lubię to (${p.likes || 0})
                            </button>
                            <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">
                                <i class="far fa-comment-alt"></i> Komentarze
                            </span>
                        </div>
                    </div>
                `}).join('');
            } catch (e) { console.error(e); }
        }

        async function submitUserPost() {
            if (!userEmail) { alert("Zaloguj się, aby dodać wpis!"); return; }
            const topic = document.getElementById('forum-topic').value;
            const content = userQuill.root.innerHTML;
            if (content.length < 5) return alert("Napisz coś więcej!");

            const res = await fetch(`${API}/api/forum/post`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, topic, content })
            });

            if (res.ok) {
                document.getElementById('post-modal').style.display = 'none';
                if(userQuill) userQuill.setContents([]);
                loadUserPosts();
            }
        }

        async function likeUserPost(id, btnElement) {
            if (!userEmail) return alert("Zaloguj się, aby lajkować!");
            const res = await fetch(`${API}/api/forum/like`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, postId: id })
            });
            if (res.ok) {
                loadUserPosts();
            }
        }

        // CZYTANIE WĄTKU
        async function openThread(postId) {
            currentThreadId = postId;
            document.getElementById('thread-modal').style.display = 'flex';
            const threadContent = document.getElementById('thread-content');
            threadContent.innerHTML = '<p style="text-align: center;">Ładowanie wątku...</p>';

            try {
                const res = await fetch(`${API}/api/forum/post/${postId}`);
                const data = await res.json();
                
                const authorAlias = data.post.email.split('@')[0];
                const initial = authorAlias.charAt(0).toUpperCase();

                let html = `
                    <div style="margin-bottom: 20px;">
                        <div class="post-header">
                            <div class="author-info">
                                <div class="avatar" style="background: #e2e8f0; color: #64748b;">${initial}</div>
                                <div>
                                    <div class="author-name">${authorAlias}</div>
                                    <div class="post-meta">${new Date(data.post.created_at).toLocaleDateString()}</div>
                                </div>
                            </div>
                            <span class="tag" style="background: var(--cherry-light); color: var(--cherry);">${data.post.topic}</span>
                        </div>
                        <div class="post-content" style="font-size: 1.05rem;">${data.post.content}</div>
                    </div>
                    <h4 style="margin: 25px 0 15px 0; border-bottom: 1px solid var(--border-light); padding-bottom: 10px;">Odpowiedzi (${data.comments.length})</h4>
                `;

                if (data.comments.length === 0) {
                    html += `<p style="color: var(--text-muted); font-size: 0.9rem;">Brak odpowiedzi. Bądź pierwszy!</p>`;
                } else {
                    html += data.comments.map(c => {
                        const cAlias = c.email.split('@')[0];
                        return `
                        <div class="comment-box">
                            <div class="comment-author">${cAlias} <span style="font-weight:normal; font-size:0.75rem; color:var(--text-muted);">${new Date(c.created_at).toLocaleDateString()}</span></div>
                            <div class="comment-text">${c.content}</div>
                        </div>
                    `}).join('');
                }
                threadContent.innerHTML = html;
            } catch (e) {
                threadContent.innerHTML = '<p style="color: red;">Błąd ładowania wątku.</p>';
            }
        }

        async function submitComment() {
            if (!userEmail) return alert("Zaloguj się, aby odpowiadać!");
            const content = document.getElementById('comment-content').value;
            if (content.length < 3) return alert("Komentarz jest za krótki!");

            const res = await fetch(`${API}/api/forum/comment`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, postId: currentThreadId, content })
            });

            if (res.ok) {
                document.getElementById('comment-content').value = '';
                openThread(currentThreadId); 
            }
        }

    </script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
