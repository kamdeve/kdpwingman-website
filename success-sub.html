<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Status Subskrypcji - KDP Wingman</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #a0134a; --success: #00C851; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        
        .container { max-width: 600px; width: 95%; padding: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 40px 30px; box-shadow: 0 0 40px rgba(160, 19, 74, 0.3); border: 2px solid var(--accent); position: relative; overflow: hidden; }
        
        /* Loading Spinner */
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        h1 { font-size: 2rem; margin: 10px 0; color: white; }
        p { color: #cbd5e1; line-height: 1.6; font-size: 1.05rem; }
        .icon-box { font-size: 4rem; margin-bottom: 20px; }
        
        .info-box { background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 10px; padding: 20px; margin: 30px 0; text-align: left; }
        .info-item { display: flex; align-items: start; gap: 15px; margin-bottom: 15px; }
        .info-item:last-child { margin-bottom: 0; }
        .check { color: #4ade80; font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
        .warn { color: #fbbf24; font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }

        .stats-row { display: flex; justify-content: space-around; margin: 20px 0; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .stat-item h3 { font-size: 0.8rem; color: #94a3b8; margin: 0 0 5px 0; text-transform: uppercase; }
        .stat-item div { font-size: 1.5rem; font-weight: bold; color: white; }

        .btn { display: inline-block; width: 100%; padding: 15px; background: linear-gradient(90deg, #a0134a 0%, #d63384 100%); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; text-decoration: none; transition: 0.3s; box-sizing: border-box; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(160, 19, 74, 0.4); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="main-card">
            <div class="spinner"></div>
            <p>Konfigurowanie Twojego konta...</p>
        </div>
    </div>

    <script>
        const API = "https://kdpwingmanv2backend-production.up.railway.app";
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type'); // 'paid' lub 'trial'
        const userEmail = localStorage.getItem('wingman_user'); // Potrzebny do pobrania statystyk

        async function init() {
            const card = document.getElementById('main-card');

            // --- WARIANT 1: KLIENT ZAPŁACIŁ (PAID) ---
            if (type === 'paid') {
                // Pobieramy statystyki (Numer na liście)
                let myNumber = "Checking...";
                let currentPrice = "...";

                try {
                    if(userEmail) {
                        const res = await fetch(`${API}/api/user/status`, {
                            method: 'POST', headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ email: userEmail })
                        });
                        const data = await res.json();
                        if(data.has_joined && data.stats) {
                            myNumber = "#" + data.stats.my_number;
                            currentPrice = data.stats.current_price + " zł";
                        }
                    }
                } catch(e) { console.log("Błąd pobierania statystyk", e); }

                card.innerHTML = `
                    <div class="icon-box">🚀</div>
                    <h1 style="color: #4ade80;">Autopilot + Zrzutka!</h1>
                    <p>Zapłacono 40 zł. Jesteś oficjalnie na liście!</p>

                    <div class="stats-row">
                        <div class="stat-item">
                            <h3>Twój Numer</h3>
                            <div style="color: #fbbf24;">${myNumber}</div>
                        </div>
                        <div class="stat-item">
                            <h3>Cena spadła do</h3>
                            <div style="color: #4ade80;">ok. ${currentPrice}</div>
                        </div>
                    </div>

                    <div class="info-box">
                        <div class="info-item">
                            <div class="check">✔</div>
                            <div>
                                <strong>Subskrypcja Aktywna</strong><br>
                                <span style="font-size: 0.9rem; color: #94a3b8;">Kolejne wpłaty będą automatyczne.</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="check">🔑</div>
                            <div>
                                <strong>Dostęp</strong><br>
                                <span style="font-size: 0.9rem; color: #cbd5e1;">Loginy przyjdą na maila 5-go dnia miesiąca.</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="check">💸</div>
                            <div>
                                <strong>Wirtualny portfel</strong><br>
                                <span style="font-size: 0.9rem; color: #cbd5e1;">Pamiętaj że różnice wyślemy Ci spowrotem na wirtualny portfel po zakończeniu zrzutki.</span>
                            </div>
                        </div>
                    </div>
                    <a href="dashboard.html" class="btn">Wróć do Panelu</a>
                `;

            } 
            // --- WARIANT 2: TYLKO AUTOPILOT (TRIAL / 0 ZŁ) ---
            else {
                card.innerHTML = `
                    <div class="icon-box">✈️</div>
                    <h1 style="color: #a0134a;">Autopilot Włączony!</h1>
                    <p>Subskrypcja aktywna na przyszłość.</p>

                    <div class="info-box" style="border-color: #fbbf24;">
                        <div class="info-item">
                            <div class="check">✔</div>
                            <div>
                                <strong>0.00 zł dzisiaj</strong><br>
                                <span style="font-size: 0.9rem; color: #94a3b8;">Nie pobraliśmy opłaty, bo masz środki w portfelu lub już opłaciłeś ten miesiąc.</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="warn">⚠️</div>
                            <div>
                                <strong>Ważne:</strong><br>
                                <span style="font-size: 0.9rem; color: #cbd5e1;">
                                    Jeśli NIE dołączyłeś jeszcze do bieżącej edycji, a chcesz to zrobić – kliknij <strong>"Dołącz teraz"</strong> w Panelu, używając środków z portfela.
                                </span>
                            </div>
                        </div>
                    </div>
                    <a href="dashboard.html" class="btn">Rozumiem, wracam do Panelu</a>
                `;
            }
        }

        // Uruchomienie z lekkim opóźnieniem (dla efektu UX)
        setTimeout(init, 500);

    </script>

</body>
</html>
